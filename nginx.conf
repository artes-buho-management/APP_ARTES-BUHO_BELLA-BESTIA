server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Archivos estaticos con cache corta para facilitar iteraciones tempranas.
  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
    expires 1h;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA fallback: cualquier ruta va a index.html.
  location / {
    try_files $uri /index.html;
  }
}
